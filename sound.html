<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Interactive 3D Particles</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Inter', sans-serif; }
        canvas { display: block; }
        #instructions {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            text-align: center;
            pointer-events: none;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        #ui-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 10;
        }
        input[type="file"] { display: none; }
        .btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn:hover { background: rgba(255, 255, 255, 0.2); border-color: #fff; }
        .btn.active { background: rgba(0, 255, 100, 0.2); border-color: #00ff64; }
    </style>
</head>
<body>

    <div id="instructions">Upload Image • Enable Mic to Expand • Move Mouse to Tilt</div>
    
    <div id="ui-container">
        <label class="btn">
            UPLOAD IMAGE
            <input type="file" id="imageLoader" accept="image/*">
        </label>
        <button class="btn" id="micBtn">ENABLE MIC</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GUI } from 'lil-gui';

        // --- Global State & Settings ---
        const state = {
            particleSize: 0.03,
            systemScale: 0.04,
            audioSensitivity: 1.5,
            expansionForce: 2.0,
            rotationSpeed: 0.002,
            autoRotate: true,
            tint: '#ffffff',
            panelWidth: 220
        };

        let scene, camera, renderer, particles, geometry, material, gui;
        
        // Interaction variables
        let mouseX = 0, mouseY = 0;
        let targetRotationX = 0, targetRotationY = 0;

        // Audio variables
        let audioCtx, analyser, dataArray;
        let currentVolume = 0;
        let smoothedVolume = 0;
        let isMicEnabled = false;

        init();

        function init() {
            // 1. Scene Setup
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 6;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            // 2. Control Panel
            gui = new GUI({ title: 'Controls' });
            gui.width = state.panelWidth;
            
            const colorFolder = gui.addFolder('Appearance');
            colorFolder.addColor(state, 'tint').name('Tint Color').onChange(v => { if(material) material.color.set(v); });
            colorFolder.add(state, 'particleSize', 0.01, 0.1).name('Particle Size');
            
            const audioFolder = gui.addFolder('Voice Reactivity');
            audioFolder.add(state, 'audioSensitivity', 0.1, 3.0).name('Scale Sensitivity');
            audioFolder.add(state, 'expansionForce', 0.1, 5.0).name('Expansion Force');
            
            const animFolder = gui.addFolder('Animation');
            animFolder.add(state, 'autoRotate').name('Auto Rotate');
            animFolder.add(state, 'rotationSpeed', 0, 0.01).name('Rotation Speed');

            // 3. Event Listeners
            document.getElementById('imageLoader').addEventListener('change', handleUpload);
            document.getElementById('micBtn').addEventListener('click', initAudio);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('resize', onResize);

            animate();
        }

        // --- Audio Setup ---
        async function initAudio() {
            if (isMicEnabled) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256; // Defines resolution of audio data

                const source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                isMicEnabled = true;
                const btn = document.getElementById('micBtn');
                btn.innerText = 'MIC ACTIVE';
                btn.classList.add('active');
            } catch (err) {
                console.error("Microphone access denied or error:", err);
                alert("Please allow microphone access to use the voice feature.");
            }
        }

        // --- Image Processing ---
        function handleUpload(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => createSystem(img);
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        }

        function createSystem(img) {
            if (particles) { scene.remove(particles); geometry.dispose(); material.dispose(); }

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const res = 120; // Internal resolution for sampling
            canvas.width = res;
            canvas.height = res * (img.height / img.width);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            const positions = [];
            const colors = [];
            const homes = [];

            for (let y = 0; y < canvas.height; y++) {
                for (let x = 0; x < canvas.width; x++) {
                    const i = (y * canvas.width + x) * 4;
                    // Filter out transparent pixels
                    if (data[i + 3] > 128) {
                        const hx = (x - canvas.width / 2) * state.systemScale;
                        const hy = -(y - canvas.height / 2) * state.systemScale;
                        const hz = (Math.random() - 0.5) * 0.5;

                        homes.push(hx, hy, hz);
                        positions.push(hx, hy, hz); // Start at home
                        colors.push(data[i]/255, data[i+1]/255, data[i+2]/255);
                    }
                }
            }

            geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            geometry.setAttribute('home', new THREE.Float32BufferAttribute(homes, 3));

            material = new THREE.PointsMaterial({
                size: state.particleSize,
                vertexColors: true,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);
        }

        // --- Mouse Interaction ---
        function onMouseMove(event) {
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
            
            // Calculate target rotation for parallax effect based on mouse
            targetRotationY = mouseX * 0.5;
            targetRotationX = -mouseY * 0.5;
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            // 1. Process Audio Data
            if (isMicEnabled && analyser) {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for (let i = 0; i < dataArray.length; i++) {
                    sum += dataArray[i];
                }
                // Calculate average volume (0 to 255) and normalize to (0.0 to 1.0)
                currentVolume = (sum / dataArray.length) / 255;
            } else {
                currentVolume = 0;
            }

            // Smooth the audio volume to prevent jittery visuals
            smoothedVolume += (currentVolume - smoothedVolume) * 0.15;

            if (particles) {
                // Update material size if changed in GUI
                material.size = state.particleSize;

                // 2. Handle Rotation & Parallax
                if (state.autoRotate) {
                    particles.rotation.y += state.rotationSpeed;
                }
                // Add smooth mouse parallax
                particles.rotation.y += (targetRotationY - particles.rotation.y) * 0.05;
                particles.rotation.x += (targetRotationX - particles.rotation.x) * 0.05;

                // 3. Handle Audio-Driven Scale and Expansion
                const audioScale = 1 + (smoothedVolume * state.audioSensitivity);
                particles.scale.set(audioScale, audioScale, audioScale);

                const posAttr = geometry.attributes.position;
                const homeAttr = geometry.attributes.home;
                const expandAmt = smoothedVolume * state.expansionForce;

                for (let i = 0; i < posAttr.count; i++) {
                    const hx = homeAttr.getX(i);
                    const hy = homeAttr.getY(i);
                    const hz = homeAttr.getZ(i);

                    // Push particles away from center based on audio volume
                    posAttr.setXYZ(i, 
                        hx * (1 + expandAmt), 
                        hy * (1 + expandAmt), 
                        hz * (1 + expandAmt)
                    );
                }
                posAttr.needsUpdate = true;
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
