<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Particle - Magnetic Assemble</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }
        canvas { display: block; }
        #instructions {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.5);
            text-align: center;
            pointer-events: none;
            font-size: 11px;
            letter-spacing: 2px;
            z-index: 10;
        }
        #ui-layer {
            position: absolute;
            bottom: 25px;
            left: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .library-group {
            display: flex;
            gap: 8px;
        }
        input[type="file"] { display: none; }
        .btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:hover { background: rgba(255, 255, 255, 0.25); border-color: rgba(255,255,255,0.5); }
        .preset-btn { background: rgba(100, 100, 255, 0.2); }
    </style>
</head>
<body>

    <div id="instructions">HOLD MOUSE TO ASSEMBLE • RELEASE TO SCATTER<br>长按鼠标聚拢 • 松开恢复</div>
    
    <div id="ui-layer">
        <div class="library-group" id="presetLibrary">
            <div class="btn preset-btn" data-url="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=500&auto=format">PRESET 1</div>
            <div class="btn preset-btn" data-url="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?w=500&auto=format">PRESET 2</div>
            <div class="btn preset-btn" data-url="https://images.unsplash.com/photo-1557683316-973673baf926?w=500&auto=format">PRESET 3</div>
        </div>
        <label class="btn">
            UPLOAD YOUR OWN
            <input type="file" id="imageLoader" accept="image/*">
        </label>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GUI } from 'lil-gui';

        const state = {
            particleSize: 0.025,
            systemScale: 0.035,
            scatterRange: 12,
            rotationSpeed: 0.005,
            autoRotate: false, // Turned off so only clicking interacts
            panelWidth: 180,
            tint: '#ffffff'
        };

        let scene, camera, renderer, particles, geometry, material, gui;
        let isPressed = false;

        init();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 6;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            gui = new GUI({ title: 'Controls' });
            gui.width = state.panelWidth;
            gui.addColor(state, 'tint').name('Color Tint').onChange(v => material.color.set(v));
            gui.add(state, 'particleSize', 0.005, 0.1).name('Size');
            gui.add(state, 'scatterRange', 2, 30).name('Scatter');
            gui.add(state, 'autoRotate').name('Auto Spin');

            // --- STRICT MOUSE INTERACTION ---
            window.addEventListener('mousedown', () => isPressed = true);
            window.addEventListener('mouseup', () => isPressed = false);
            // Touch support for mobile clicking
            window.addEventListener('touchstart', (e) => { isPressed = true; }, {passive: true});
            window.addEventListener('touchend', () => isPressed = false);

            // Library Event Listeners
            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    loadFromURL(e.target.dataset.url);
                });
            });

            document.getElementById('imageLoader').addEventListener('change', handleUpload);
            window.addEventListener('resize', onResize);

            // Auto-load first preset to show effect immediately
            loadFromURL(document.querySelector('.preset-btn').dataset.url);

            animate();
        }

        function loadFromURL(url) {
            const img = new Image();
            img.crossOrigin = "Anonymous"; // Essential for external images
            img.onload = () => createSystem(img);
            img.src = url;
        }

        function handleUpload(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => createSystem(img);
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        }

        function createSystem(img) {
            if (particles) { 
                scene.remove(particles); 
                geometry.dispose(); 
                material.dispose(); 
            }

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const res = 120; 
            canvas.width = res;
            canvas.height = res * (img.height / img.width);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            const positions = [];
            const colors = [];
            const homes = [];
            const scats = [];

            for (let y = 0; y < canvas.height; y++) {
                for (let x = 0; x < canvas.width; x++) {
                    const i = (y * canvas.width + x) * 4;
                    if (data[i + 3] > 128) {
                        const hx = (x - canvas.width / 2) * state.systemScale;
                        const hy = -(y - canvas.height / 2) * state.systemScale;
                        const hz = (Math.random() - 0.5) * 0.5;
                        homes.push(hx, hy, hz);

                        const sx = (Math.random() - 0.5) * state.scatterRange;
                        const sy = (Math.random() - 0.5) * state.scatterRange;
                        const sz = (Math.random() - 0.5) * state.scatterRange;
                        scats.push(sx, sy, sz);

                        positions.push(sx, sy, sz);
                        colors.push(data[i]/255, data[i+1]/255, data[i+2]/255);
                    }
                }
            }

            geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            geometry.setAttribute('home', new THREE.Float32BufferAttribute(homes, 3));
            geometry.setAttribute('scat', new THREE.Float32BufferAttribute(scats, 3));

            material = new THREE.PointsMaterial({
                size: state.particleSize,
                vertexColors: true,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (particles) {
                if (state.autoRotate) particles.rotation.y += state.rotationSpeed;
                material.size = state.particleSize;

                const posAttr = geometry.attributes.position;
                const homeAttr = geometry.attributes.home;
                const scatAttr = geometry.attributes.scat;

                const lerpSpeed = isPressed ? 0.12 : 0.05; 

                for (let i = 0; i < posAttr.count; i++) {
                    const curX = posAttr.getX(i);
                    const curY = posAttr.getY(i);
                    const curZ = posAttr.getZ(i);

                    const targetX = isPressed ? homeAttr.getX(i) : scatAttr.getX(i);
                    const targetY = isPressed ? homeAttr.getY(i) : scatAttr.getY(i);
                    const targetZ = isPressed ? homeAttr.getZ(i) : scatAttr.getZ(i);

                    posAttr.setXYZ(i, 
                        curX + (targetX - curX) * lerpSpeed,
                        curY + (targetY - curY) * lerpSpeed,
                        curZ + (targetZ - curZ) * lerpSpeed
                    );
                }
                posAttr.needsUpdate = true;
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
