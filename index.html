<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - 跨维度门户</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@200;400&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #010103; overflow: hidden;
            font-family: 'Inter', sans-serif; color: white;
        }

        /* 3D 背景容器 */
        #webgl-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        #content-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            pointer-events: none;
        }

        .header { text-align: center; margin-bottom: 60px; pointer-events: auto; }

        h1 {
            font-family: 'Cinzel', serif; font-size: clamp(2.5rem, 8vw, 4.5rem);
            margin: 0; letter-spacing: 15px; font-weight: 400;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.8rem; letter-spacing: 6px; margin-top: 15px;
            color: #8892b0; text-transform: uppercase;
        }

        .portal-grid {
            display: flex; gap: 30px; pointer-events: auto;
            flex-wrap: wrap; justify-content: center; max-width: 1000px; padding: 20px;
        }

        .portal-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px; border-radius: 4px;
            text-decoration: none; color: white;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            width: 200px; text-align: center;
        }

        .portal-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .card-icon { font-size: 2rem; margin-bottom: 15px; display: block; }
        .card-title { font-family: 'Cinzel', serif; font-size: 1.2rem; letter-spacing: 2px; margin-bottom: 10px; }
        .card-desc { font-size: 0.75rem; color: #8892b0; line-height: 1.6; }

        /* 右下角二维码触发按钮 */
        .qr-trigger {
            position: absolute; bottom: 30px; right: 30px; z-index: 100;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 12px 20px; border-radius: 50px; cursor: pointer;
            backdrop-filter: blur(10px); pointer-events: auto;
            transition: all 0.3s; font-size: 14px; letter-spacing: 1px;
        }
        .qr-trigger:hover { background: rgba(255, 255, 255, 0.15); transform: scale(1.05); }

        /* 二维码弹窗 */
        #qr-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px);
            z-index: 1000; justify-content: center; align-items: center; flex-direction: column;
        }
        .qr-container {
            background: white; padding: 25px; border-radius: 15px; box-shadow: 0 0 50px rgba(0,0,0,1);
            margin-bottom: 20px;
        }
        .qr-close {
            color: white; border: 1px solid white; background: transparent;
            padding: 8px 25px; border-radius: 50px; cursor: pointer; transition: 0.3s;
        }
        .qr-close:hover { background: white; color: black; }

        #site-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #010103; z-index: 9999; display: flex;
            justify-content: center; align-items: center; transition: opacity 1s;
        }
    </style>
</head>
<body>

    <div id="site-loader">初始化星际门户...</div>
    <div id="webgl-container"></div>

    <!-- 二维码按钮 -->
    <button class="qr-trigger" onclick="toggleQR()">📱 手机扫码访问</button>

    <!-- 二维码弹窗 -->
    <div id="qr-modal">
        <div class="qr-container" id="qrcode"></div>
        <p style="margin-bottom: 20px; letter-spacing: 2px; font-weight: 200;">扫描二维码 开启移动交互</p>
        <button class="qr-close" onclick="toggleQR()">关闭</button>
    </div>

    <div id="content-layer">
        <header class="header">
            <h1>Nexus</h1>
            <p class="subtitle">Digital Existence Portal</p>
        </header>

        <nav class="portal-grid">
            <a href="holo.html" class="portal-card">
                <span class="card-icon">✧</span>
                <div class="card-title">Hologram</div>
                <div class="card-desc">全息粒子投影系统<br>AI手势实时交互控制</div>
            </a>

            <a href="mouse.html" class="portal-card">
                <span class="card-icon">✦</span>
                <div class="card-title">Fluid</div>
                <div class="card-desc">交互艺术<br>感应指尖的律动</div>
            </a>

            <a href="sound.html" class="portal-card">
                <span class="card-icon">❂</span>
                <div class="card-title">Sound</div>
                <div class="card-desc">音频交互<br>探索声音的视觉表现</div>
            </a>
        </nav>
    </div>

    <!-- 脚本引用 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script type="importmap">
        { "imports": { "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer, starGroup;
        let mouseX = 0, mouseY = 0;

        // 二维码逻辑
        window.toggleQR = function() {
            const modal = document.getElementById('qr-modal');
            const qrDiv = document.getElementById('qrcode');
            
            if (modal.style.display === 'flex') {
                modal.style.display = 'none';
            } else {
                qrDiv.innerHTML = ""; // 清空旧的
                new QRCode(qrDiv, {
                    text: window.location.href, // 自动获取当前 HTTPS 网址
                    width: 180,
                    height: 180,
                    colorDark : "#000000",
                    colorLight : "#ffffff"
                });
                modal.style.display = 'flex';
            }
        };

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 2000);
            camera.position.z = 1000;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('webgl-container').appendChild(renderer.domElement);

            starGroup = new THREE.Group();
            scene.add(starGroup);

            const geo = new THREE.BufferGeometry();
            const pos = [];
            const colors = [];
            const color = new THREE.Color();

            for(let i=0; i<10000; i++) {
                const r = 900 * Math.sqrt(Math.random());
                const theta = Math.random() * Math.PI * 2;
                pos.push(Math.cos(theta)*r, (Math.random()-0.5)*250, Math.sin(theta)*r);
                color.setHSL(0.6 + Math.random()*0.15, 0.7, 0.6);
                colors.push(color.r, color.g, color.b);
            }
            geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            
            const mat = new THREE.PointsMaterial({ size: 1.8, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true, opacity: 0.65 });
            starGroup.add(new THREE.Points(geo, mat));

            document.addEventListener('mousemove', e => {
                mouseX = (e.clientX - window.innerWidth/2) * 0.12;
                mouseY = (e.clientY - window.innerHeight/2) * 0.12;
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            setTimeout(() => {
                const loader = document.getElementById('site-loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 1000);
            }, 800);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            starGroup.rotation.y += 0.0008;
            camera.position.x += (mouseX - camera.position.x) * 0.05;
            camera.position.y += (-mouseY - camera.position.y) * 0.05;
            camera.lookAt(scene.position);
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
